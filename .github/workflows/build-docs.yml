name: Build Documentation

on:
  push:
    paths:
      - 'docs/**'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-base texlive-pictures texlive-latex-extra

      - name: Build PDF
        run: |
          cd docs
          pdflatex design-document.tex
          pdflatex design-document.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: design-document
          path: docs/design-document.pdf
