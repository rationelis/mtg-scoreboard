name: Build Documentation

on:
  push:
    paths:
      - "docs/**"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-base texlive-pictures texlive-latex-extra

      - name: Build PDF
        run: |
          cd docs
          pdflatex design-document.tex
          pdflatex design-document.tex

      - name: Prepare Pages
        run: |
          mkdir -p _site
          cp docs/design-document.pdf _site/
          echo '<html><head><meta http-equiv="refresh" content="0;url=design-document.pdf"></head></html>' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
